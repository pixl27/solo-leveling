    <style>
        body {
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            overflow-x: hidden;
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .skills-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            color: #fff;
            font-size: 2.5em;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #85acb9;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: rgba(133, 172, 185, 0.8);
            font-size: 1em;
            letter-spacing: 3px;
        }

        .muscle-filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .muscle-filter {
            background: transparent;
            border: 1px solid rgba(133, 172, 185, 0.5);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            font-size: 0.8em;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
        }

        .muscle-filter:hover {
            border-color: #85acb9;
            color: #85acb9;
        }

        .muscle-filter.active {
            border-color: #85acb9;
            color: #85acb9;
            background: rgba(133, 172, 185, 0.1);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .skill-card {
            background: transparent;
            border: 1px solid rgba(133, 172, 185, 0.5);
            padding: 25px;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .skill-card:hover {
            border-color: #85acb9;
            box-shadow: 0 0 30px rgba(133, 172, 185, 0.4);
            transform: translateY(-5px);
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(133, 172, 185, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .skill-card:hover::before {
            opacity: 1;
        }

        .skill-card.locked {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .skill-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .skill-level-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 10px;
            font-size: 0.7em;
            letter-spacing: 1px;
            border: 1px solid;
        }

        .level-beginner {
            border-color: #4caf50;
            color: #4caf50;
        }

        .level-intermediate {
            border-color: #2196f3;
            color: #2196f3;
        }

        .level-advanced {
            border-color: #ff9800;
            color: #ff9800;
        }

        .level-master {
            border-color: #9c27b0;
            color: #9c27b0;
            text-shadow: 0 0 10px #9c27b0;
        }

        .skill-icon {
            font-size: 2.5em;
            color: #85acb9;
            text-shadow: 0 0 20px #85acb9;
            margin-bottom: 15px;
        }

        .skill-name {
            color: #fff;
            font-size: 1.2em;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px #85acb9;
        }

        .skill-muscle {
            color: rgba(133, 172, 185, 0.8);
            font-size: 0.75em;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .skill-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .skill-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px 0;
            border-top: 1px solid rgba(133, 172, 185, 0.2);
        }

        .skill-stat {
            text-align: center;
        }

        .skill-stat-label {
            color: rgba(133, 172, 185, 0.6);
            font-size: 0.65em;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .skill-stat-value {
            color: #fff;
            font-size: 0.9em;
            font-weight: bold;
        }

        .skill-stat-value.str { color: #ff4757; }
        .skill-stat-value.agi { color: #00ff62; }
        .skill-stat-value.end { color: #ffd700; }

        .skill-xp-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(133, 172, 185, 0.3);
            margin-top: 10px;
            overflow: hidden;
        }

        .skill-xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #85acb9, #63aac2);
            box-shadow: 0 0 10px #85acb9;
        }

        .skill-mastery {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            font-size: 0.7em;
        }

        .skill-mastery-label {
            color: rgba(133, 172, 185, 0.6);
        }

        .skill-mastery-level {
            color: #85acb9;
        }

        /* Skill Detail Modal */
        .skill-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .skill-modal.show {
            display: flex;
        }

        .skill-modal-content {
            background: transparent;
            border: 2px solid #fff;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(133, 172, 185, 0.5);
        }

        .skill-modal-content::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 1px solid rgba(133, 172, 185, 0.3);
            pointer-events: none;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(133, 172, 185, 0.3);
        }

        .modal-icon {
            font-size: 3em;
            color: #85acb9;
            text-shadow: 0 0 30px #85acb9;
        }

        .modal-title {
            color: #fff;
            font-size: 1.8em;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #85acb9;
        }

        .modal-muscle {
            color: rgba(133, 172, 185, 0.8);
            font-size: 0.8em;
            letter-spacing: 2px;
        }

        .modal-section {
            margin-bottom: 25px;
        }

        .modal-section-title {
            color: #85acb9;
            font-size: 1em;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-section-title i {
            font-size: 0.9em;
        }

        .instruction-list {
            list-style: none;
            padding: 0;
        }

        .instruction-list li {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            border-bottom: 1px solid rgba(133, 172, 185, 0.1);
        }

        .instruction-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #85acb9;
            box-shadow: 0 0 10px #85acb9;
        }

        .variation-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .variation-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(133, 172, 185, 0.3);
            padding: 12px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .variation-item:hover {
            border-color: #85acb9;
            background: rgba(133, 172, 185, 0.1);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: 1px solid rgba(133, 172, 185, 0.5);
            color: #85acb9;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
        }

        .close-modal:hover {
            border-color: #85acb9;
            box-shadow: 0 0 15px rgba(133, 172, 185, 0.5);
        }

        @media (max-width: 768px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }

            .variation-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <style>
        /* Talents — ajouts (système de maîtrise + entraînement) */
        .skill-boosts { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
        .skill-boost { font-size:.66em; padding:2px 7px; border:1px solid; border-radius:3px; letter-spacing:1px; }
        .sk-str{color:#ff4757;border-color:#ff4757;} .sk-agi{color:#00ff62;border-color:#00ff62;} .sk-end{color:#ffd700;border-color:#ffd700;}
        .skill-bonus { font-size:.74em; letter-spacing:1px; color:#9c27b0; margin:6px 0; }
        .skill-train-btn { width:100%; margin-top:14px; background:rgba(133,172,185,.15); border:1px solid #85acb9; color:#fff; padding:11px; letter-spacing:2px; cursor:pointer; font-family:inherit; font-size:.82em; transition:all .2s; }
        .skill-train-btn:hover { background:rgba(133,172,185,.3); box-shadow:0 0 16px rgba(133,172,185,.4); }
        .skill-train-btn:disabled { cursor:default; }
        .skill-locked-note { margin-top:14px; text-align:center; color:#ff9800; font-size:.76em; letter-spacing:1px; border:1px dashed rgba(255,152,0,.5); padding:9px; }
        /* Overlay d'entraînement (chrono inversé) */
        .tr-ov { position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:10050; display:flex; align-items:center; justify-content:center; animation: fadeIn .3s ease-out; padding:20px; }
        .tr-box { text-align:center; max-width:440px; width:100%; }
        .tr-name { font-size:1.6em; color:#fff; letter-spacing:3px; text-shadow:0 0 16px #85acb9; margin-bottom:6px; }
        .tr-sub { color:rgba(255,255,255,.5); letter-spacing:2px; font-size:.8em; margin-bottom:18px; }
        .tr-clock { font-size:5em; font-weight:300; color:#85acb9; text-shadow:0 0 30px #85acb9; line-height:1; }
        .tr-clock.low { color:#ff9800; text-shadow:0 0 30px #ff9800; } .tr-clock.up { color:#ff4757; text-shadow:0 0 30px #ff4757; }
        .tr-count { font-size:3em; color:#fff; margin:8px 0; }
        .tr-controls { display:flex; gap:12px; justify-content:center; margin-top:22px; flex-wrap:wrap; }
        .tr-btn { background:transparent; border:1px solid #85acb9; color:#fff; padding:12px 24px; letter-spacing:2px; cursor:pointer; font-family:inherit; font-size:.9em; transition:all .2s; }
        .tr-btn.primary { background:rgba(133,172,185,.2); }
        .tr-btn:hover { box-shadow:0 0 16px rgba(133,172,185,.4); }
        .tr-result { font-size:1.1em; letter-spacing:2px; margin-top:14px; min-height:1.2em; }
    </style>

    <script>
    (function () {
        const H = window.Hunter;
        const t = (k) => (window.I18n ? I18n.t(k) : k);
        const lang = () => (window.I18n && I18n.lang === 'fr') ? 'fr' : 'en';

        // Catalogue de talents (bilingue). statBoost = bonus permanent PAR palier de maîtrise.
        const SKILLS = [
            { id:'pushups', muscle:'chest', icon:'fa-hands', badge:'beginner', type:'reps', target:20, xp:12, statBoost:{STR:1,END:1},
              fr:{name:'POMPES', muscle:'PECTORAUX • ÉPAULES • TRICEPS', desc:'La base de la force du haut du corps.'},
              en:{name:'PUSH-UPS', muscle:'CHEST • SHOULDERS • TRICEPS', desc:'The foundation of upper body strength.'} },
            { id:'pullups', muscle:'back', icon:'fa-arrow-up', badge:'intermediate', type:'reps', target:10, xp:18, statBoost:{STR:2,AGI:1},
              fr:{name:'TRACTIONS', muscle:'DOS • BICEPS • AVANT-BRAS', desc:'Le test ultime de la force de traction.'},
              en:{name:'PULL-UPS', muscle:'BACK • BICEPS • FOREARMS', desc:'The ultimate test of pulling strength.'} },
            { id:'squats', muscle:'legs', icon:'fa-arrow-down', badge:'beginner', type:'reps', target:25, xp:12, statBoost:{STR:1,AGI:2},
              fr:{name:'SQUATS', muscle:'QUADRICEPS • FESSIERS', desc:'Construis la base de la puissance des jambes.'},
              en:{name:'SQUATS', muscle:'QUADRICEPS • GLUTES', desc:'Build the foundation of lower body power.'} },
            { id:'plank', muscle:'core', icon:'fa-minus', badge:'beginner', type:'time', target:30, xp:10, statBoost:{END:2,STR:1},
              fr:{name:'GAINAGE', muscle:'GAINAGE • ÉPAULES • DOS', desc:'Forge un tronc incassable.'},
              en:{name:'PLANK', muscle:'CORE • SHOULDERS • BACK', desc:'Forge an unbreakable core.'} },
            { id:'burpees', muscle:'cardio', icon:'fa-fire', badge:'advanced', type:'reps', target:15, xp:22, statBoost:{STR:1,AGI:3},
              fr:{name:'BURPEES', muscle:'CORPS ENTIER • CARDIO', desc:"L'exercice de conditionnement ultime."},
              en:{name:'BURPEES', muscle:'FULL BODY • CARDIO', desc:'The ultimate full-body conditioning exercise.'} },
            { id:'dips', muscle:'arms', icon:'fa-arrows-alt-v', badge:'intermediate', type:'reps', target:12, xp:16, statBoost:{STR:2,END:1},
              fr:{name:'DIPS', muscle:'TRICEPS • PECTORAUX • ÉPAULES', desc:'Développe une force de poussée puissante.'},
              en:{name:'DIPS', muscle:'TRICEPS • CHEST • SHOULDERS', desc:'Develop powerful pushing strength.'} },
            { id:'lunges', muscle:'legs', icon:'fa-walking', badge:'beginner', type:'reps', target:20, xp:12, statBoost:{STR:1,AGI:2},
              fr:{name:'FENTES', muscle:'QUADRICEPS • FESSIERS • ÉQUILIBRE', desc:"Force et équilibre sur une jambe."},
              en:{name:'LUNGES', muscle:'QUADRICEPS • GLUTES • BALANCE', desc:'Single-leg strength and balance.'} },
            { id:'pikepushups', muscle:'shoulders', icon:'fa-mountain', badge:'intermediate', type:'reps', target:12, xp:16, statBoost:{STR:2,END:1},
              fr:{name:'POMPES PIQUÉES', muscle:'ÉPAULES • TRICEPS', desc:"Cible les épaules. Voie vers l'ATR."},
              en:{name:'PIKE PUSH-UPS', muscle:'SHOULDERS • TRICEPS', desc:'Target shoulders. Path to handstand.'} },
            { id:'running', muscle:'cardio', icon:'fa-running', badge:'beginner', type:'time', target:40, xp:14, statBoost:{AGI:2,END:2},
              fr:{name:'COURSE', muscle:'CARDIO • JAMBES • ENDURANCE', desc:'La compétence cardio fondamentale.'},
              en:{name:'RUNNING', muscle:'CARDIO • LEGS • ENDURANCE', desc:'The fundamental cardio skill.'} },
            { id:'mountainclimbers', muscle:'core', icon:'fa-heartbeat', badge:'beginner', type:'time', target:30, xp:12, statBoost:{END:2,AGI:2},
              fr:{name:'MOUNTAIN CLIMBERS', muscle:'GAINAGE • CARDIO • ÉPAULES', desc:'Gainage haute intensité.'},
              en:{name:'MOUNTAIN CLIMBERS', muscle:'CORE • CARDIO • SHOULDERS', desc:'High-intensity core exercise.'} },
            { id:'muscleup', muscle:'back', icon:'fa-crown', badge:'master', type:'reps', target:5, xp:35, statBoost:{STR:3,AGI:2}, prereq:{pullups:5, dips:5},
              fr:{name:'MUSCLE-UP', muscle:'DOS • PECTORAUX • BRAS', desc:"Le mouvement signature du Hunter d'élite."},
              en:{name:'MUSCLE UP', muscle:'BACK • CHEST • ARMS', desc:'The signature move of an elite Hunter.'} },
            { id:'handstandpushups', muscle:'shoulders', icon:'fa-street-view', badge:'master', type:'reps', target:6, xp:30, statBoost:{STR:3,END:2}, prereq:{pikepushups:5},
              fr:{name:'POMPES ATR', muscle:'ÉPAULES • TRICEPS • GAINAGE', desc:'Maîtrise totale de la poussée verticale.'},
              en:{name:'HANDSTAND PUSH-UPS', muscle:'SHOULDERS • TRICEPS • CORE', desc:'Total mastery of vertical pressing.'} }
        ];
        const byId = (id) => SKILLS.find(s => s.id === id);
        const prereqMet = (s) => !s.prereq || Object.keys(s.prereq).every(k => H.getTalentLevel(k) >= s.prereq[k]);
        const boostsHTML = (map) => Object.keys(map).map(k => `<span class="skill-boost sk-${k.toLowerCase()}">+${map[k]} ${k}</span>`).join('');

        function cardHTML(s) {
            const L = s[lang()];
            const td = H.getTalent(s.id), level = td.level, maxed = level >= 10, locked = !prereqMet(s);
            const need = maxed ? 1 : H.talentXpForLevel(level);
            const pct = maxed ? 100 : Math.min(100, td.xp / need * 100);
            const cur = {}; for (const k in s.statBoost) cur[k] = s.statBoost[k] * level;
            let action;
            if (locked) {
                const req = Object.keys(s.prereq).map(k => `${byId(k)[lang()].name} ${t('lvl.lv')}${s.prereq[k]}`).join(' & ');
                action = `<div class="skill-locked-note"><i class="fas fa-lock"></i> ${t('tal.requires')}: ${req}</div>`;
            } else if (maxed) {
                action = `<button class="skill-train-btn" disabled style="opacity:.6;border-color:#ffd700;color:#ffd700;"><i class="fas fa-crown"></i> ${t('tal.max')}</button>`;
            } else {
                action = `<button class="skill-train-btn" data-train="${s.id}"><i class="fas fa-dumbbell"></i> ${t('tal.train')}</button>`;
            }
            return `<div class="skill-card${locked ? ' locked' : ''}" data-muscle="${s.muscle}" data-skill="${s.id}">
                <span class="skill-level-badge level-${s.badge}">${s.badge.toUpperCase()}</span>
                <div class="skill-icon"><i class="fas ${locked ? 'fa-lock' : s.icon}"></i></div>
                <div class="skill-name">${L.name}</div>
                <div class="skill-muscle">${L.muscle}</div>
                <div class="skill-description">${L.desc}</div>
                <div class="skill-boosts">${boostsHTML(s.statBoost)}<span class="skill-boost" style="color:#85acb9;border-color:#85acb9;">+${s.xp} XP</span></div>
                ${level > 0 ? `<div class="skill-bonus"><i class="fas fa-star"></i> ${t('tal.bonus')}: ${Object.keys(cur).map(k => '+' + cur[k] + ' ' + k).join(' · ')}</div>` : ''}
                <div class="skill-xp-bar"><div class="skill-xp-fill" style="width:${pct}%"></div></div>
                <div class="skill-mastery"><span class="skill-mastery-label">${t('tal.mastery')}</span><span class="skill-mastery-level">${t('lvl.lv')} ${level} / 10</span></div>
                ${action}
            </div>`;
        }

        function render() {
            const grid = document.getElementById('skillsGrid');
            const active = document.querySelector('.muscle-filter.active');
            const filter = active ? active.dataset.filter : 'all';
            grid.innerHTML = SKILLS.filter(s => filter === 'all' || s.muscle === filter).map(cardHTML).join('');
            grid.querySelectorAll('[data-train]').forEach(b => b.onclick = () => trainSkill(b.dataset.train));
        }

        document.querySelectorAll('.muscle-filter').forEach(btn => btn.addEventListener('click', function () {
            document.querySelectorAll('.muscle-filter').forEach(b => b.classList.remove('active'));
            this.classList.add('active'); render();
        }));

        // ---- Entraînement chronométré (chrono inversé) ----
        function trainSkill(id) {
            const s = byId(id); if (!s) return;
            const isTime = s.type === 'time';
            const limit = isTime ? s.target : 30;
            const ov = document.createElement('div'); ov.className = 'tr-ov';
            ov.innerHTML = `<div class="tr-box">
                <div class="tr-name">${s[lang()].name}</div>
                <div class="tr-sub"><i class="fas fa-hourglass-half"></i> ${isTime ? t('tal.hold') : t('tal.reps')}</div>
                <div class="tr-clock" id="trClock">${limit}</div>
                ${isTime ? '' : '<div class="tr-count" id="trCount">0</div>'}
                <div class="tr-controls" id="trControls"></div>
                <div class="tr-result" id="trResult"></div>
            </div>`;
            document.body.appendChild(ov);
            let reps = 0, left = limit, done = false, timer = null;
            const clock = ov.querySelector('#trClock'), controls = ov.querySelector('#trControls');

            const finish = () => {
                if (done) return; done = true; clearInterval(timer);
                const perf = isTime ? Math.max(1, Math.round(limit - left) || limit) * 2 : reps * 3;
                const res = ov.querySelector('#trResult');
                res.style.color = '#4caf50';
                res.innerHTML = `<i class="fas fa-check"></i> ${t('tal.train_done')} <span style="color:#85acb9;">+${s.xp} XP</span>`;
                controls.innerHTML = `<button class="tr-btn primary" id="trClose">${t('lvl.continue')}</button>`;
                ov.querySelector('#trClose').onclick = () => {
                    ov.remove();
                    // Récompenses APRÈS fermeture → les overlays/toasts (level-up, maîtrise) restent visibles
                    H.completeTalentTraining(id, { name: s[lang()].name, xp: s.xp, statBoost: s.statBoost }, perf);
                    render();
                };
                if (window.GymUI) GymUI.sound('xp');
            };

            if (isTime) {
                controls.innerHTML = `<button class="tr-btn" id="trStop">${t('wk.skip')}</button>`;
                ov.querySelector('#trStop').onclick = finish;
            } else {
                controls.innerHTML = `<button class="tr-btn primary" id="trRep">+1 ${t('tal.reps')}</button><button class="tr-btn" id="trStop">${t('wk.skip')}</button>`;
                ov.querySelector('#trRep').onclick = () => { if (done) return; reps++; ov.querySelector('#trCount').textContent = reps; if (window.GymUI) GymUI.sound('xp'); };
                ov.querySelector('#trStop').onclick = finish;
            }
            if (window.GymUI) GymUI.sound('click');
            timer = setInterval(() => {
                left--; clock.textContent = Math.max(0, left);
                clock.classList.toggle('low', left <= limit * 0.3 && left > 0);
                if (left <= 0) { clock.classList.add('up'); finish(); }
            }, 1000);
        }

        render();
        if (window.I18n) I18n.onChange(render);
    })();
    </script>

    <script src="js/solo-leveling.js"></script>
</body>
</html>
