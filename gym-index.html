<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW GYM - Arise</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/solo-leveling.css" rel="stylesheet">
    <link href="css/gym.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/equipment.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/quests.js"></script>
    <script src="js/weekly.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth-ui.js"></script>
    <style>
        body {
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .gym-logo {
            font-size: 4em;
            color: #85acb9;
            text-shadow: 
                0 0 10px #85acb9,
                0 0 20px #85acb9,
                0 0 40px #85acb9;
            letter-spacing: 8px;
            margin-bottom: 10px;
            -webkit-text-stroke: 1px #fff;
        }

        .gym-subtitle {
            font-size: 1.2em;
            color: #fff;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #85acb9;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .system-message {
            color: #03a9f4;
            font-size: 1.1em;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(3, 169, 244, 0.9);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .hunter-input {
            background: transparent;
            border: 1px solid #85acb9;
            color: #fff;
            padding: 15px 25px;
            font-size: 1.1em;
            text-align: center;
            width: 300px;
            margin: 20px auto;
            display: block;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
        }

        .hunter-input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(133, 172, 185, 0.5);
            border-color: #fff;
        }

        .hunter-input::placeholder {
            color: rgba(133, 172, 185, 0.6);
            letter-spacing: 2px;
        }

        .rank-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border: 2px solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .rank-badge::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 1px solid currentColor;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .rank-badge:hover::after {
            opacity: 1;
        }

        .rank-e { color: #888; border-color: #888; }
        .rank-d { color: #4caf50; border-color: #4caf50; }
        .rank-c { color: #2196f3; border-color: #2196f3; }
        .rank-b { color: #9c27b0; border-color: #9c27b0; }
        .rank-a { color: #ff9800; border-color: #ff9800; }
        .rank-s { color: #ffd700; border-color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        .rank-badge:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px currentColor;
        }

        .countdown-warning {
            color: #ff4757;
            font-size: 0.9em;
            margin-top: 10px;
            text-shadow: 0 0 10px #ff4757;
            opacity: 0;
            animation: warningFade 1s ease-out 2s forwards;
        }

        @keyframes warningFade {
            to { opacity: 1; }
        }

        .glowing-blue {
            color: #03a9f4 !important;
            text-shadow: 0 0 10px #03a9f4, 0 0 20px #03a9f4, 0 0 30px #03a9f4 !important;
        }

        .glowing-green {
            color: #4caf50 !important;
            text-shadow: 0 0 10px #4caf50, 0 0 20px #4caf50, 0 0 30px #4caf50 !important;
        }

        .glowing-purple {
            color: #9c27b0 !important;
            text-shadow: 0 0 10px #9c27b0, 0 0 20px #9c27b0, 0 0 30px #9c27b0 !important;
        }

        .glowing-gold {
            color: #ffd700 !important;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px #ffd700 !important;
        }

        .glowing-red {
            color: #ff4757 !important;
            text-shadow: 0 0 10px #ff4757, 0 0 20px #ff4757, 0 0 30px #ff4757 !important;
        }

        .glowing-orange {
            color: #ff9800 !important;
            text-shadow: 0 0 10px #ff9800, 0 0 20px #ff9800, 0 0 30px #ff9800 !important;
        }
    </style>
</head>
<body>
    <div class="sl-background">
        <div class="sl-background-image" style="background-image: url('backgroundnotif.png')"></div>
        <div class="sl-light-rays"></div>
        <div class="sl-glow"></div>
        <div class="shockwave-ring"></div>
        <div class="shockwave-ring"></div>
    </div>

    <div class="scene-overlay"></div>
    <div class="flash-overlay"></div>
    <div class="bg-particles"></div>
    <div class="sl-particles"></div>

    <div class="sl-notification" style="width: 685px; height: 315px; padding: 40px 60px; transform: translate(-50%, -50%); border: 2px solid #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); margin-left: 45px;">
        <!-- <div class="rune-circle"></div>
        <div class="rune-circle" style="animation-direction: reverse; width: 110%; height: 110%; top: -5%; left: -5%;"></div> -->
        
        <div class="sl-title">
            <span class="sl-exclamation">!</span>
            <span data-i18n="onb.awakening">SYSTEM AWAKENING</span>
        </div>
        
        <p><span data-i18n="onb.chosen">You have been chosen to become a</span> <span class="glowing glowing-blue" data-i18n="onb.hunter">HUNTER</span></p>
        
        <input type="text" class="hunter-input" id="hunterName" data-i18n-ph="onb.name_ph" placeholder="ENTER YOUR HUNTER NAME">

        <p style="font-size: 0.9em; opacity: 0.8;" data-i18n="onb.your_rank">Your assigned rank:</p>
        
        <div class="rank-display">
            <div class="rank-badge rank-e" data-rank="E" title="E-Rank: Beginner">E</div>
            <div class="rank-badge rank-d" data-rank="D" title="D-Rank: Novice">D</div>
            <div class="rank-badge rank-c" data-rank="C" title="C-Rank: Intermediate">C</div>
            <div class="rank-badge rank-b" data-rank="B" title="B-Rank: Advanced">B</div>
            <div class="rank-badge rank-a" data-rank="A" title="A-Rank: Expert">A</div>
            <div class="rank-badge rank-s" data-rank="S" title="S-Rank: Elite">S</div>
        </div>

        <div class="buttons-container" style="margin-top: 20px;">
            <button class="btn-custom" id="beginBtn">
                <span class="btn-glow"></span>
                <span data-i18n="onb.begin">BEGIN TRAINING</span>
            </button>
        </div>
    </div>

    <div class="dramatic-reveal">
        <div class="shine-lines"></div>
        <div class="dramatic-text" data-i18n="onb.activated">SYSTEM ACTIVATED</div>
    </div>

    <script>
        // Initialize particles
        function createBackgroundParticles() {
            const container = document.querySelector('.bg-particles');
            if (!container) return;
            
            const particleCount = 100;
            
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'bg-particle';
                particle.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 4 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                particle.style.animation = `floatUpDiagonal ${duration}s ${delay}s linear infinite`;
                container.appendChild(particle);
            }

            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }

            setInterval(() => {
                const oldParticles = container.querySelectorAll('.bg-particle');
                if (oldParticles.length > particleCount) {
                    oldParticles[0].remove();
                }
                createParticle();
            }, 200);
        }

        createBackgroundParticles();

        // Rank selection (disabled - rank is randomly assigned)
        let selectedRank = 'E';

        // Rang assigné aléatoirement — PONDÉRÉ : les rangs élevés sont rares.
        // (poids → ~ D 50%, E 30%, C 12%, B 5%, A 2.5%, S 0.5%)
        const RANK_WEIGHTS = { E: 30, D: 50, C: 12, B: 5, A: 2.5, S: 0.5 };
        function weightedRank() {
            const entries = Object.keys(RANK_WEIGHTS).map(k => [k, RANK_WEIGHTS[k]]);
            const total = entries.reduce((s, e) => s + e[1], 0);
            let r = Math.random() * total;
            for (const [rank, w] of entries) { r -= w; if (r <= 0) return rank; }
            return 'E';
        }
        const randomRank = weightedRank();
        selectedRank = randomRank;
        
        // Apply selection to the random rank badge and disable all badges
        document.querySelectorAll('.rank-badge').forEach(badge => {
            badge.style.pointerEvents = 'none';
            badge.style.cursor = 'default';
            if (badge.dataset.rank === randomRank) {
                badge.style.transform = 'scale(1.3)';
                badge.style.boxShadow = `0 0 30px currentColor`;
            } else {
                badge.style.opacity = '0.4';
            }
        });

        // Add pulse animation for rank selection
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rankPulse {
                0% { transform: scale(1); opacity: 1; }
                100% { transform: scale(2); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Begin training button
        document.getElementById('beginBtn').addEventListener('click', function() {
            const hunterNameInput = document.getElementById('hunterName');
            const hunterName = hunterNameInput.value.trim() || 'Hunter';
            
            console.log('Hunter Name:', hunterName); // Debug log
            
            // Store hunter data
            localStorage.setItem('hunterName', hunterName);
            localStorage.setItem('hunterRank', selectedRank);
            localStorage.setItem('hunterLevel', '1');
            localStorage.setItem('hunterXP', '0');
            localStorage.setItem('hunterSTR', '10');
            localStorage.setItem('hunterAGI', '10');
            localStorage.setItem('hunterEND', '10');
            localStorage.setItem('hunterVIT', '100');
            localStorage.setItem('totalWorkouts', '0');
            localStorage.setItem('currentStreak', '0');
            localStorage.setItem('lastWorkout', '');

            const reveal = document.querySelector('.dramatic-reveal');
            
            // Create power circles
            for (let i = 0; i < 3; i++) {
                const circle = document.createElement('div');
                circle.className = 'power-circle';
                circle.style.left = '50%';
                circle.style.top = '50%';
                
                circle.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 0.8 },
                    { transform: 'translate(-50%, -50%) scale(4)', opacity: 0 }
                ], {
                    duration: 1500,
                    delay: i * 200,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                }).onfinish = () => circle.remove();
                
                reveal.appendChild(circle);
            }
            
            setTimeout(() => {
                reveal.classList.add('active');
                document.querySelector('.dramatic-text').textContent = (window.I18n ? I18n.t('onb.welcome',{name:hunterName.toUpperCase()}) : 'WELCOME, '+hunterName.toUpperCase());
                
                const burstInterval = setInterval(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 100;
                    const particle = document.createElement('div');
                    particle.style.cssText = `
                        position: absolute;
                        width: 2px;
                        height: 10px;
                        background: #85acb9;
                        left: 50%;
                        top: 50%;
                        transform-origin: center;
                    `;
                    
                    particle.animate([
                        { transform: `translate(-50%, -50%) rotate(${angle}rad) translateY(0)`, opacity: 1 },
                        { transform: `translate(-50%, -50%) rotate(${angle}rad) translateY(${distance}px)`, opacity: 0 }
                    ], {
                        duration: 1000,
                        easing: 'ease-out'
                    }).onfinish = () => particle.remove();
                    
                    reveal.appendChild(particle);
                }, 100);
                
                setTimeout(() => {
                    clearInterval(burstInterval);
                    reveal.classList.remove('active');
                    document.body.style.transition = 'opacity 0.5s ease-out';
                    document.body.style.opacity = '0';
                    
                    setTimeout(() => {
                        window.location.href = 'gym-setup.html';
                    }, 500);
                }, 3000);
            }, 500);
        });

        // Button effects
        document.querySelectorAll('.btn-custom').forEach(button => {
            button.addEventListener('mouseenter', function() {
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'energy-particle';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 30 + Math.random() * 20;
                    
                    particle.style.setProperty('--startX', `${Math.cos(angle) * distance}px`);
                    particle.style.setProperty('--startY', `${Math.sin(angle) * distance}px`);
                    particle.style.setProperty('--endX', `${Math.cos(angle) * (distance + 20)}px`);
                    particle.style.setProperty('--endY', `${Math.sin(angle) * (distance + 20)}px`);
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.animation = `energyFloat ${0.5 + Math.random()}s ease-out`;
                    
                    button.appendChild(particle);
                    particle.addEventListener('animationend', () => particle.remove());
                }
            });
        });

        // Flash effect on load
        const flash = document.querySelector('.flash-overlay');
        if (flash) {
            flash.addEventListener('animationend', () => flash.remove());
        }
    </script>
    <script src="js/solo-leveling.js"></script>
</body>
</html>
