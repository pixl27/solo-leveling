# =====================================================================
# SHADOW GYM - Configuration Netlify
# Site statique (aucune étape de build). Déploiement : voir README.md
# =====================================================================

[build]
  publish = "."
  command = ""

# La racine "/" sert l'index du gym (réécriture, l'URL reste "/").
# force = true est OBLIGATOIRE : sinon Netlify sert le fichier index.html
# existant (ancienne app) au lieu d'appliquer la réécriture ("shadowing").
[[redirects]]
  from = "/"
  to = "/gym-index.html"
  status = 200
  force = true

# En-têtes de sécurité sur toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# HTML : toujours revalider (pour livrer les mises à jour rapidement)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS / CSS : cache court (le service worker gère le hors-ligne)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=600"

# Images / icône : cache long
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Le service worker ne doit jamais être mis en cache longtemps
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
