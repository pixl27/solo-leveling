<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0d2138"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a6d4e2"/>
      <stop offset="100%" stop-color="#5b8a99"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#85acb9" stroke-width="3" opacity="0.35"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#85acb9" stroke-width="1.5" opacity="0.2"/>

  <!-- Halo -->
  <g filter="url(#blur)" opacity="0.6">
    <rect x="120" y="238" width="272" height="36" rx="18" fill="#85acb9"/>
  </g>

  <!-- Haltère stylisé -->
  <g fill="url(#glow)" stroke="#eaf6fb" stroke-width="2">
    <rect x="150" y="244" width="212" height="24" rx="12"/>
    <rect x="104" y="206" width="40" height="100" rx="14"/>
    <rect x="368" y="206" width="40" height="100" rx="14"/>
    <rect x="74"  y="226" width="30" height="60"  rx="12"/>
    <rect x="408" y="226" width="30" height="60"  rx="12"/>
  </g>

  <!-- Éclat "level up" -->
  <path d="M256 96 l16 44 44 16 -44 16 -16 44 -16 -44 -44 -16 44 -16 z" fill="#eaf6fb" opacity="0.9"/>
</svg>
